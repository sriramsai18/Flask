{% extends 'base.html' %}

{% block title %}Prediction Result{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="card text-center shadow">
        <div class="card-header bg-success text-white">
            <h3>Prediction Output</h3>
        </div>
        <div class="card-body py-5">
            <h2 class="display-5">{{ prediction_text }}</h2>
            <p class="text-muted mt-3">This result is generated based on the XGBoost ML model analysis.</p>
            <a href="{{ url_for('predict') }}" class="btn btn-outline-primary mt-4">New Prediction</a>
            <a href="{{ url_for('home') }}" class="btn btn-outline-secondary mt-4">Back to Home</a>
        </div>
    </div>
</div>
{% endblock %}
